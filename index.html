  <style>
    :root {
      --bg: #000000;
      --bg-1: #0a0a0a;
      --bg-2: #131313;
      --line: #1f1f1f;
      --line-2: #2a2a2a;
      --fg: #f5f5f5;
      --dim: #8a8a8a;
      --dim-2: #555;
      --red: #ff2a2a;
      --green: #2ecf6b;
      --amber: #ffb020;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { background: var(--bg); color: var(--fg); }
    body {
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 13px;
      line-height: 1.45;
      letter-spacing: 0.01em;
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .font-display { font-family: 'Bebas Neue', 'IBM Plex Sans', sans-serif; letter-spacing: 0.02em; }
    .font-sans-mono { font-family: 'IBM Plex Sans', sans-serif; }
    .grid-bg {
      background-image:
        linear-gradient(to right, rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 24px 24px;
    }
    .scanline::after {
      content: '';
      position: absolute;
      left: 0; right: 0; top: 0;
      height: 2px;
      background: linear-gradient(to bottom, transparent, var(--red), transparent);
      box-shadow: 0 0 12px var(--red);
      animation: scan 2.4s linear infinite;
    }
    @keyframes scan {
      0% { transform: translateY(0); }
      100% { transform: translateY(100%); }
    }
    .blink { animation: blink 1.1s steps(2, start) infinite; }
    @keyframes blink { to { visibility: hidden; } }
    .pulse-dot { animation: pulseDot 1.6s ease-in-out infinite; }
    @keyframes pulseDot {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 1; }
    }
    .crosshair-h, .crosshair-v {
      position: absolute;
      background: var(--line-2);
      pointer-events: none;
    }
    .crosshair-h { left: 0; right: 0; height: 1px; }
    .crosshair-v { top: 0; bottom: 0; width: 1px; }
    .corner {
      position: absolute;
      width: 14px; height: 14px;
      border: 1px solid var(--fg);
    }
    .corner.tl { top: -1px; left: -1px; border-right: none; border-bottom: none; }
    .corner.tr { top: -1px; right: -1px; border-left: none; border-bottom: none; }
    .corner.bl { bottom: -1px; left: -1px; border-right: none; border-top: none; }
    .corner.br { bottom: -1px; right: -1px; border-left: none; border-top: none; }
    .btn {
      font-family: 'IBM Plex Mono', monospace;

    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-ghost {

    .badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;

    .badge.live { color: var(--red); border-color: var(--red); }
    .badge.ok { color: var(--green); border-color: var(--green); }
    .panel {
      border: 1px solid var(--line);

    .label {

    .num { font-variant-numeric: tabular-nums; }
    .row {
      display: flex; align-items: center; justify-content: space-between;

    .stamp-chop { color: var(--red); text-shadow: 0 0 24px rgba(255,42,42,0.22); }
    .vignette { box-shadow: inset 0 0 80px rgba(0,0,0,0.6); }
    .stamp-slam { animation: stampSlam 880ms cubic-bezier(0.2, 0.8, 0.25, 1.05) both; transform-origin: center; }
    @keyframes stampSlam {
      0%   { transform: scale(3.5) rotate(-12deg); opacity: 0; filter: blur(10px); }
      55%  { transform: scale(0.82) rotate(2deg);  opacity: 1; filter: blur(0);   }
      72%  { transform: scale(1.10) rotate(-1deg); }

    .stamp-flash { position: absolute; inset: 0; pointer-events: none; animation: stampFlash 700ms ease-out both; animation-delay: 380ms; }
    @keyframes stampFlash {

    video.specimen-feed.no-mirror { transform: none; }
    .face-frame {
      position: absolute; inset: 6% 14%;

    .shutter-btn {
      width: 76px; height: 76px; border-radius: 50%;

      position: relative; cursor: pointer;
      transition: transform 0.08s ease;
    }
    .shutter-btn::before {
      content: ''; position: absolute; inset: 6px;
      border: 2px solid #000; border-radius: 50%;
      background: var(--fg);

    .shutter-btn.armed::before { background: var(--red); border-color: var(--red); }
    input[type="file"] { display: none; }
    .marquee {
      white-space: nowrap;
      overflow: hidden;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 6px 0;
      font-size: 10px; color: var(--dim);
      letter-spacing: 0.18em; text-transform: uppercase;
    }
    .marquee > span {
      display: inline-block;
      padding-left: 100%;
      animation: marquee 38s linear infinite;
    }
    @keyframes marquee { to { transform: translateX(-100%); } }
    .typewriter::after {
      content: '_';
      animation: blink 1s steps(2, start) infinite;
      color: var(--red);
    }

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ---- Constants ----------------------------------------------------------
const BUILD = '1.0.0-α';
const SUB = 'CRANIAL.ANALYSIS.ENGINE';
const STORAGE_KEY = 'mogchop.scans.v1';

// MediaPipe FaceLandmarker landmark indices (468-point mesh)
// "left" / "right" below refer to the SUBJECT's anatomy.
// In a non-mirrored selfie, the SUBJECT'S left = VIEWER's right.
const LM = {
  forehead: 10,
  chin: 152,
  // Eyes (subject left)
  L_eye_outer: 263, L_eye_inner: 362, L_eye_top: 386, L_eye_bot: 374,
  // Eyes (subject right)
  R_eye_outer: 33,  R_eye_inner: 133, R_eye_top: 159, R_eye_bot: 145,
  // Brows
  L_brow_inner: 285, L_brow_outer: 282,
  R_brow_inner: 55,  R_brow_outer: 52,
  // Cheekbones (zygomatic prominence)
  L_zygo: 280, R_zygo: 50,
  // Jaw / gonion
  L_gonion: 397, R_gonion: 172,
  L_jaw_lat: 454, R_jaw_lat: 234,
  // Nose
  nose_tip: 1, nose_bridge: 168, subnasale: 2,
  L_alae: 294, R_alae: 64,
  // Mouth
  upper_lip_top: 13, lower_lip_bot: 14,
  upper_lip_outer: 0, lower_lip_outer: 17,
  L_mouth: 291, R_mouth: 61,
};

// Mirror pairs for symmetry (idx-left, idx-right)
const SYM_PAIRS = [
  [263, 33], [362, 133], [386, 159], [374, 145],
  [285, 55], [282, 52],
  [280, 50], [397, 172], [454, 234],
  [294, 64], [291, 61],
  [323, 93], [361, 132], [288, 58], [365, 136],
];

// ---- Math helpers --------------------------------------------------------
const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
const mid = (a, b) => ({ x: (a.x + b.x)/2, y: (a.y + b.y)/2, z: ((a.z||0)+(b.z||0))/2 });
const ang = (a, b) => Math.atan2(b.y - a.y, b.x - a.x) * 180 / Math.PI;
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const fmt = (n, d=2) => (n == null || isNaN(n)) ? '—' : Number(n).toFixed(d);

// Score a measurement against an ideal (μ) with tolerance (σ).
// Score = 100 - 28 * |z|, clamped 5..98, where z = (v - μ)/σ.
const score = (v, mu, sigma) => {
  const z = (v - mu) / sigma;
  return clamp(100 - 28 * Math.abs(z), 5, 98);
};

// ---- Hex / patient code -------------------------------------------------
const codeId = () => {
  const r = Math.random().toString(16).slice(2, 8).toUpperCase();
  return `CAE-${r.slice(0,3)}-${r.slice(3)}`;
};

// ---- Measurements --------------------------------------------------------
function computeMetrics(lm, imgW, imgH) {
  // Convert normalized landmarks to pixels
  const P = lm.map((p) => ({ x: p.x * imgW, y: p.y * imgH, z: p.z || 0 }));
  const get = (i) => P[i];

  const forehead = get(LM.forehead);
  const chin = get(LM.chin);
  const faceH = dist(forehead, chin);
  const faceW = dist(get(LM.L_jaw_lat), get(LM.R_jaw_lat));

  // Symmetry: distance of each pair midpoint from facial midline (forehead→chin)
  // Actually compute the |delta| in the perpendicular axis.
  // Approach: project each landmark to midline; symmetry error = |d_left + d_right|
  // where d is signed perpendicular distance.
  const midlineDx = chin.x - forehead.x;
  const midlineDy = chin.y - forehead.y;
  const midlineLen = Math.hypot(midlineDx, midlineDy) || 1;
  const nx = -midlineDy / midlineLen, ny = midlineDx / midlineLen;
  const perp = (p) => (p.x - forehead.x) * nx + (p.y - forehead.y) * ny;
  let symErrSum = 0, symMaxAbs = 0;
  for (const [li, ri] of SYM_PAIRS) {
    const dl = perp(P[li]);
    const dr = perp(P[ri]);
    const e = Math.abs(dl + dr); // mirror should sum to ~0
    symErrSum += e;
    if (Math.abs(dl - dr) > symMaxAbs) symMaxAbs = Math.abs(dl - dr);
  }
  const symRel = symErrSum / SYM_PAIRS.length / faceW; // smaller = better
  const symmetryScore = clamp(100 - 1800 * symRel, 5, 99);

  // Canthal tilt: angle from inner→outer canthus per eye, then averaged.
  // Image coords: Y grows downward; subject's left/right eye swap sign of dx.
  // We want POSITIVE = outer corner ABOVE inner corner ("hunter eyes"),
  // regardless of which side. So measure the rise (inner.y - outer.y) over
  // the absolute horizontal run.
  const tiltOf = (inner, outer) =>
    Math.atan2(inner.y - outer.y, Math.abs(outer.x - inner.x)) * 180 / Math.PI;
  const tiltL = tiltOf(get(LM.L_eye_inner), get(LM.L_eye_outer));
  const tiltR = tiltOf(get(LM.R_eye_inner), get(LM.R_eye_outer));
  const canthalTilt = (tiltL + tiltR) / 2; // degrees, + = positive tilt

  // Bigonial / bizygomatic ratio (jaw width / cheekbone width)
  const bigonial = dist(get(LM.L_gonion), get(LM.R_gonion));
  const bizygomatic = dist(get(LM.L_zygo), get(LM.R_zygo));
  const bgBz = bigonial / bizygomatic;

  // Facial thirds: forehead-to-browline, browline-to-subnasale, subnasale-to-chin
  const browMid = mid(get(LM.L_brow_inner), get(LM.R_brow_inner));
  const subnasale = get(LM.subnasale);
  const t1 = dist(forehead, browMid) / faceH;
  const t2 = dist(browMid, subnasale) / faceH;
  const t3 = dist(subnasale, chin) / faceH;
  const thirdsDev = (Math.abs(t1 - 1/3) + Math.abs(t2 - 1/3) + Math.abs(t3 - 1/3)) / 3;

  // Facial fifths: 5 × eye width vs face width
  const eyeW_L = dist(get(LM.L_eye_inner), get(LM.L_eye_outer));
  const eyeW_R = dist(get(LM.R_eye_inner), get(LM.R_eye_outer));
  const eyeW = (eyeW_L + eyeW_R) / 2;
  const fifthsRatio = (5 * eyeW) / faceW; // ~1.0 ideal

  // Inter-canthal width / eye width (ideal: ~1.0)
  const interCanthal = dist(get(LM.L_eye_inner), get(LM.R_eye_inner));
  const ic_eyeW = interCanthal / eyeW;

  // Lip ratio (lower lip height / upper lip height; ideal ~1.6)
  const upperLipH = dist(get(LM.upper_lip_outer), get(LM.upper_lip_top));
  const lowerLipH = dist(get(LM.lower_lip_bot), get(LM.lower_lip_outer));
  const lipRatio = lowerLipH / Math.max(upperLipH, 0.01);

  // Mouth width / nose width (ideal ~1.5–1.6)
  const mouthW = dist(get(LM.L_mouth), get(LM.R_mouth));
  const noseW = dist(get(LM.L_alae), get(LM.R_alae));
  const mouthNose = mouthW / Math.max(noseW, 0.01);

  // Philtrum length / lower-third height (ideal ~0.30)
  const philtrum = dist(subnasale, get(LM.upper_lip_top));
  const lowerThirdH = dist(subnasale, chin);
  const philRatio = philtrum / lowerThirdH;

  // Nose length / face length (ideal ~0.36–0.40)
  const noseLen = dist(get(LM.nose_bridge), get(LM.subnasale));
  const noseFace = noseLen / faceH;

  // Brow apex elevation: higher = more arched (ideal modest)
  const browApexL = (get(LM.L_brow_outer).y);
  const browApexR = (get(LM.R_brow_outer).y);
  const browInnerL = get(LM.L_brow_inner).y;
  const browInnerR = get(LM.R_brow_inner).y;
  const browArch = ((browInnerL - browApexL) + (browInnerR - browApexR)) / 2 / faceH;

  // Mandibular angle proxy: angle at gonion from chin→gonion→jaw_lat
  const mandAngleL = (() => {
    const a = get(LM.chin), b = get(LM.L_gonion), c = get(LM.L_jaw_lat);
    const v1 = { x: a.x-b.x, y: a.y-b.y }, v2 = { x: c.x-b.x, y: c.y-b.y };
    const cos = (v1.x*v2.x + v1.y*v2.y) / (Math.hypot(v1.x,v1.y)*Math.hypot(v2.x,v2.y) || 1);
    return Math.acos(clamp(cos, -1, 1)) * 180 / Math.PI;
  })();
  const mandAngleR = (() => {
    const a = get(LM.chin), b = get(LM.R_gonion), c = get(LM.R_jaw_lat);
    const v1 = { x: a.x-b.x, y: a.y-b.y }, v2 = { x: c.x-b.x, y: c.y-b.y };
    const cos = (v1.x*v2.x + v1.y*v2.y) / (Math.hypot(v1.x,v1.y)*Math.hypot(v2.x,v2.y) || 1);
    return Math.acos(clamp(cos, -1, 1)) * 180 / Math.PI;
  })();
  const mandAngle = (mandAngleL + mandAngleR) / 2;

  // Compose metric definitions: id, label, value, unit, ideal μ, σ, weight
  const M = [
    { id: 'symmetry',     label: 'Bilateral Symmetry Index',  value: symmetryScore,  unit: 'BSI',   mu: 92,   sigma: 8,    w: 0.16, isScore: true },
    { id: 'canthal',      label: 'Mean Canthal Tilt',         value: canthalTilt,    unit: '°',     mu: 4.0,  sigma: 3.5,  w: 0.10 },
    { id: 'bgBz',         label: 'Bigonial/Bizygomatic',      value: bgBz,           unit: '',      mu: 0.78, sigma: 0.07, w: 0.10 },
    { id: 'thirds',       label: 'Facial Thirds Deviation',   value: thirdsDev,      unit: 'σ',     mu: 0.025,sigma: 0.03, w: 0.08, lowerBetter: true },
    { id: 'fifths',       label: 'Facial Fifths Ratio',       value: fifthsRatio,    unit: '',      mu: 1.0,  sigma: 0.10, w: 0.07 },
    { id: 'interCanthal', label: 'Inter-Canthal / Eye Width', value: ic_eyeW,        unit: '',      mu: 1.0,  sigma: 0.10, w: 0.06 },
    { id: 'lip',          label: 'Vermilion Ratio',           value: lipRatio,       unit: '',      mu: 1.55, sigma: 0.40, w: 0.06 },
    { id: 'mouthNose',    label: 'Stomion / Alar Ratio',      value: mouthNose,      unit: '',      mu: 1.55, sigma: 0.20, w: 0.06 },
    { id: 'philtrum',     label: 'Philtral Index',            value: philRatio,      unit: '',      mu: 0.30, sigma: 0.06, w: 0.05 },
    { id: 'nose',         label: 'Naso-Facial Length',        value: noseFace,       unit: '',      mu: 0.38, sigma: 0.05, w: 0.06 },
    { id: 'brow',         label: 'Brow Arch Elevation',       value: browArch,       unit: '',      mu: 0.018,sigma: 0.012,w: 0.05 },
    { id: 'mandible',     label: 'Mandibular Gonial Angle',   value: mandAngle,      unit: '°',     mu: 122,  sigma: 8,    w: 0.10 },
  ];

  // Score each
  for (const m of M) {
    if (m.isScore) {
      m.score = m.value;
      m.z = (m.value - m.mu) / m.sigma;
    } else {
      m.z = (m.value - m.mu) / m.sigma;
      m.score = score(m.value, m.mu, m.sigma);
    }
  }

  // Overall: weighted average
  const totalW = M.reduce((s, m) => s + m.w, 0);
  const overall = M.reduce((s, m) => s + m.score * m.w, 0) / totalW;

  return { metrics: M, overall, faceW, faceH, midline: { forehead, chin } };
}

// ---- Verdict tiers -------------------------------------------------------
function verdictFor(overall) {
  if (overall >= 88) return { stamp: 'MOG', tier: 'MYTHICAL MOGGER',     side: 'mog',  blurb: 'phenotype borderline-anomalous' };
  if (overall >= 78) return { stamp: 'MOG', tier: 'CERTIFIED MOGGER',    side: 'mog',  blurb: 'morphometrics within elite envelope' };
  if (overall >= 70) return { stamp: 'MOG', tier: 'MARGINAL MOGGER',     side: 'mog',  blurb: 'aesthetic vector trending positive' };
  if (overall >= 62) return { stamp: 'MID', tier: 'MORPHOLOGICAL MID',   side: 'mid',  blurb: 'no decisive gradient detected' };
  if (overall >= 52) return { stamp: 'CHOP',tier: 'MARGINAL CHOP',       side: 'chop', blurb: 'sub-canonical proportional drift' };
  if (overall >= 40) return { stamp: 'CHOP',tier: 'HARD CHOP',           side: 'chop', blurb: 'multiple deviations from norm exceed σ' };
  return                { stamp: 'CHOP',tier: 'PERMACHOPPED',         side: 'chop', blurb: 'phenotype severely off-axis' };
}

// ---- MediaPipe loader ----------------------------------------------------
let _landmarker = null;
async function getLandmarker() {
  if (_landmarker) return _landmarker;
  const vision = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22-rc.20250304/vision_bundle.mjs');
  const { FilesetResolver, FaceLandmarker } = vision;
  const fileset = await FilesetResolver.forVisionTasks(
    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22-rc.20250304/wasm'
  );
  _landmarker = await FaceLandmarker.createFromOptions(fileset, {
    baseOptions: {
      modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
      delegate: 'GPU',
    },
    runningMode: 'IMAGE',
    numFaces: 1,
  });
  return _landmarker;
}

// ---- Image utilities -----------------------------------------------------
async function loadImage(file) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => resolve({ img, url });
    img.onerror = reject;
    img.src = url;
  });
}

function downsize(img, maxDim = 1024) {
  const ratio = Math.min(1, maxDim / Math.max(img.naturalWidth, img.naturalHeight));
  const w = Math.round(img.naturalWidth * ratio);
  const h = Math.round(img.naturalHeight * ratio);
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0, w, h);
  return c;
}

function canvasToB64(canvas, type = 'image/jpeg', q = 0.85) {
  return canvas.toDataURL(type, q);
}

// ---- Dossier renderer ----------------------------------------------------
// Burns the diagnostic overlay onto the photo: full mesh, midline, fifths
// grid, thirds rule, canthal tilt arcs, mandibular angle arcs, calipers
// (bizygomatic, bigonial, mouth, nose, inter-canthal), philtral bracket,
// labeled glyph crosshairs, registration marks, top/bottom telemetry burn-in,
// diagonal watermark, verdict stamp.
function renderAnnotatedDossier({ imgEl, lm, M, scanId, verdict, ts }) {
  const target = 1100;
  const ratio = Math.min(1, target / Math.max(imgEl.naturalWidth, imgEl.naturalHeight));
  const W = Math.round(imgEl.naturalWidth * ratio);
  const H = Math.round(imgEl.naturalHeight * ratio);
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');

  // Base photo, darkened hard so the overlay reads as the primary content.
  ctx.drawImage(imgEl, 0, 0, W, H);
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, W, H);

  const px = (i) => ({ x: lm[i].x * W, y: lm[i].y * H });
  const fh = px(LM.forehead), ch = px(LM.chin);
  const faceH = Math.hypot(ch.x - fh.x, ch.y - fh.y) || 1;
  const lZyg = px(LM.L_zygo), rZyg = px(LM.R_zygo);
  const lGon = px(LM.L_gonion), rGon = px(LM.R_gonion);
  const lJaw = px(LM.L_jaw_lat), rJaw = px(LM.R_jaw_lat);

  // ---- helpers
  const set = (color, width = 1, dash = null) => {
    ctx.strokeStyle = color; ctx.lineWidth = width;
    ctx.setLineDash(dash || []);
  };
  // Plain stroke (no halo) — for faint grids only.
  const lineFaint = (a, b) => { ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke(); };
  // Haloed stroke — dark outline first, colored line on top. Every primary
  // construction line uses this so it reads against any background.
  const line = (a, b) => {
    const fg = ctx.strokeStyle, fw = ctx.lineWidth, fd = ctx.getLineDash();
    ctx.strokeStyle = 'rgba(0,0,0,0.85)';
    ctx.lineWidth = fw + 2.4;
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
    ctx.strokeStyle = fg; ctx.lineWidth = fw; ctx.setLineDash(fd);
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  };
  const ticked = (a, b, t = 10) => {
    line(a, b);
    const dx = b.x - a.x, dy = b.y - a.y, L = Math.hypot(dx, dy) || 1;
    const nx = -dy / L * t, ny = dx / L * t;
    line({ x: a.x - nx, y: a.y - ny }, { x: a.x + nx, y: a.y + ny });
    line({ x: b.x - nx, y: b.y - ny }, { x: b.x + nx, y: b.y + ny });
  };
  const arc = (cx, cy, r, a0, a1) => {
    const fg = ctx.strokeStyle, fw = ctx.lineWidth, fd = ctx.getLineDash();
    ctx.strokeStyle = 'rgba(0,0,0,0.85)';
    ctx.lineWidth = fw + 2.4; ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(cx, cy, r, a0, a1); ctx.stroke();
    ctx.strokeStyle = fg; ctx.lineWidth = fw; ctx.setLineDash(fd);
    ctx.beginPath(); ctx.arc(cx, cy, r, a0, a1); ctx.stroke();
  };
  const circle = (p, r) => arc(p.x, p.y, r, 0, Math.PI * 2);
  const dot = (p, r) => { ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI * 2); ctx.fill(); };
  const chip = (text, anchor, color = '#F5F5F5', bg = 'rgba(0,0,0,0.82)', size = 11) => {
    ctx.font = `${size}px ui-monospace, "JetBrains Mono", monospace`;
    const w = ctx.measureText(text).width + 8;
    const h = size + 6;
    ctx.fillStyle = bg;
    ctx.fillRect(anchor.x, anchor.y - h, w, h);
    ctx.strokeStyle = color; ctx.lineWidth = 0.6; ctx.setLineDash([]);
    ctx.strokeRect(anchor.x + 0.3, anchor.y - h + 0.3, w - 0.6, h - 0.6);
    ctx.fillStyle = color;
    ctx.fillText(text, anchor.x + 4, anchor.y - 5);
  };

  const Mby = Object.fromEntries(M.metrics.map((m) => [m.id, m]));

  // 1. Faint full 468-point mesh — bigger, brighter dots so they read.
  ctx.fillStyle = 'rgba(255,80,80,0.85)';
  for (const p of lm) ctx.fillRect(p.x * W - 0.9, p.y * H - 0.9, 1.8, 1.8);

  // 2. Vertical fifths grid (faint, no halo)
  set('rgba(245,245,245,0.45)', 0.8, [2, 5]);
  for (let i = 1; i < 5; i++) {
    const x = lJaw.x + (rJaw.x - lJaw.x) * i / 5;
    lineFaint({ x, y: 0 }, { x, y: H });
  }
  ctx.fillStyle = 'rgba(245,245,245,0.95)';
  ctx.font = 'bold 11px ui-monospace, monospace';
  ctx.fillText(`FIFTHS Σ = ${Mby.fifths.value.toFixed(3)}`, 8, H - 52);

  // 3. Horizontal thirds rule (faint, no halo)
  const browMid = mid(px(LM.L_brow_inner), px(LM.R_brow_inner));
  const subn = px(LM.subnasale);
  set('rgba(245,245,245,0.7)', 0.8, [5, 4]);
  for (const y of [fh.y, browMid.y, subn.y, ch.y]) lineFaint({ x: 0, y }, { x: W, y });
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.font = 'bold 11px ui-monospace, monospace';
  ctx.fillText(`T₁ = ${(dist(fh, browMid)/faceH).toFixed(3)}`, 8, fh.y + 16);
  ctx.fillText(`T₂ = ${(dist(browMid, subn)/faceH).toFixed(3)}`, 8, browMid.y + 16);
  ctx.fillText(`T₃ = ${(dist(subn, ch)/faceH).toFixed(3)}`, 8, subn.y + 16);

  // 4. Subject midline (red, extended) — bold
  set('#FF2A2A', 2.2);
  const dxN = (ch.x - fh.x) / faceH, dyN = (ch.y - fh.y) / faceH, ext = 36;
  line({ x: fh.x - dxN*ext, y: fh.y - dyN*ext }, { x: ch.x + dxN*ext, y: ch.y + dyN*ext });

  // 5. Bizygomatic + bigonial calipers (values live in the bottom telemetry strip)
  set('#FFFFFF', 1.6);
  ticked(lZyg, rZyg, 12);
  ticked(lGon, rGon, 12);

  // 6. Inter-canthal width
  const lInner = px(LM.L_eye_inner), rInner = px(LM.R_eye_inner);
  set('#FF2A2A', 1.4);
  ticked(lInner, rInner, 8);

  // 7. Canthal tilt — line + horizontal baseline + arc + signed value
  const tiltAt = (innerIdx, outerIdx) => {
    const inn = px(innerIdx), out = px(outerIdx);
    const dxSign = (out.x - inn.x) >= 0 ? 1 : -1;
    set('#FFEC2A', 1.8); line(inn, out);
    set('rgba(255,236,42,0.7)', 1.2, [4, 3]); line(inn, { x: out.x, y: inn.y });
    set('#FFEC2A', 1.4);
    const r = 24;
    const a0 = dxSign > 0 ? 0 : Math.PI;
    const a1 = Math.atan2(out.y - inn.y, out.x - inn.x);
    arc(inn.x, inn.y, r, Math.min(a0, a1), Math.max(a0, a1));
    const signed = Math.atan2(inn.y - out.y, Math.abs(out.x - inn.x)) * 180 / Math.PI;
    const txt = `${signed >= 0 ? '+' : ''}${signed.toFixed(1)}°`;
    ctx.font = 'bold 12px ui-monospace, "JetBrains Mono", monospace';
    const w = ctx.measureText(txt).width + 8;
    const labelX = dxSign > 0 ? inn.x + r + 4 : inn.x - r - 4 - w;
    chip(txt, { x: labelX, y: inn.y + 4 }, '#FFEC2A', 'rgba(0,0,0,0.92)', 12);
  };
  tiltAt(LM.L_eye_inner, LM.L_eye_outer);
  tiltAt(LM.R_eye_inner, LM.R_eye_outer);

  // 8. Eye boxes (frontal aperture zones)
  ctx.font = 'bold 10px ui-monospace, monospace';
  for (const [innerI, outerI, topI, botI, side] of [
    [LM.L_eye_inner, LM.L_eye_outer, LM.L_eye_top, LM.L_eye_bot, 'L'],
    [LM.R_eye_inner, LM.R_eye_outer, LM.R_eye_top, LM.R_eye_bot, 'R'],
  ]) {
    const inn = px(innerI), out = px(outerI), top = px(topI), bot = px(botI);
    const xMin = Math.min(inn.x, out.x) - 4, xMax = Math.max(inn.x, out.x) + 4;
    const yMin = top.y - 4, yMax = bot.y + 4;
    set('#2ECF6B', 1.4);
    line({ x: xMin, y: yMin }, { x: xMax, y: yMin });
    line({ x: xMax, y: yMin }, { x: xMax, y: yMax });
    line({ x: xMax, y: yMax }, { x: xMin, y: yMax });
    line({ x: xMin, y: yMax }, { x: xMin, y: yMin });
    ctx.fillStyle = '#2ECF6B';
    ctx.fillText(`AP·${side}`, xMin + 2, yMin - 4);
  }

  // 9. Mandibular angle arcs
  const mandAt = (gonI, jawI) => {
    const gon = px(gonI), jaw = px(jawI);
    set('#FF2A2A', 1.8); line(ch, gon); line(gon, jaw);
    set('#FF2A2A', 1.4);
    const r = 28;
    const a1 = Math.atan2(ch.y - gon.y, ch.x - gon.x);
    const a2 = Math.atan2(jaw.y - gon.y, jaw.x - gon.x);
    arc(gon.x, gon.y, r, Math.min(a1, a2), Math.max(a1, a2));
    const v1 = { x: ch.x - gon.x, y: ch.y - gon.y };
    const v2 = { x: jaw.x - gon.x, y: jaw.y - gon.y };
    const cos = (v1.x*v2.x + v1.y*v2.y) / ((Math.hypot(v1.x, v1.y) * Math.hypot(v2.x, v2.y)) || 1);
    const angDeg = Math.acos(clamp(cos, -1, 1)) * 180 / Math.PI;
    const dxSign = (jaw.x - gon.x) >= 0 ? 1 : -1;
    const txt = `${angDeg.toFixed(0)}°`;
    ctx.font = 'bold 12px ui-monospace, monospace';
    const w = ctx.measureText(txt).width + 8;
    const lx = dxSign > 0 ? gon.x + r + 4 : gon.x - r - 4 - w;
    chip(txt, { x: lx, y: gon.y + 6 }, '#FF8888', 'rgba(0,0,0,0.92)', 12);
  };
  mandAt(LM.L_gonion, LM.L_jaw_lat);
  mandAt(LM.R_gonion, LM.R_jaw_lat);

  // 10. Mouth, nose alar, philtrum, lip stack
  const lAl = px(LM.L_alae), rAl = px(LM.R_alae);
  const lMo = px(LM.L_mouth), rMo = px(LM.R_mouth);
  const ulT = px(LM.upper_lip_top), llB = px(LM.lower_lip_bot);
  const ulO = px(LM.upper_lip_outer), llO = px(LM.lower_lip_outer);

  set('#FFFFFF', 1.4);
  ticked(lAl, rAl, 8);
  ticked(lMo, rMo, 8);

  set('#FFEC2A', 1.4);
  line(subn, ulT);

  set('#FF2A2A', 1.4);
  line(ulO, ulT);
  line(llB, llO);

  // 11. Brow arch
  set('#2ECF6B', 1.6);
  line(px(LM.L_brow_inner), px(LM.L_brow_outer));
  line(px(LM.R_brow_inner), px(LM.R_brow_outer));

  // 12. Naso-facial axis
  set('#FFEC2A', 1.4, [5, 3]);
  line(px(LM.nose_bridge), subn);

  // 13. Glyph-labeled anatomical landmarks
  set('#FFFFFF', 1.4);
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 12px ui-monospace, monospace';
  const KEYPTS = [
    ['α', LM.forehead], ['β', LM.chin], ['γ', LM.nose_tip], ['δ', LM.subnasale],
    ['ε₁', LM.L_eye_outer], ['ε₂', LM.R_eye_outer],
    ['ζ₁', LM.L_zygo], ['ζ₂', LM.R_zygo],
    ['η₁', LM.L_gonion], ['η₂', LM.R_gonion],
  ];
  for (const [g, idx] of KEYPTS) {
    const p = px(idx);
    circle(p, 5); dot(p, 1.6);
    // text shadow / halo for the glyph
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillText(g, p.x + 7, p.y - 6);
    ctx.fillText(g, p.x + 7, p.y - 8);
    ctx.fillText(g, p.x + 5, p.y - 7);
    ctx.fillText(g, p.x + 9, p.y - 7);
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText(g, p.x + 7, p.y - 7);
  }

  // 14. Corner registration marks
  set('#FF2A2A', 2);
  const cs = 22;
  for (const [cx, cy] of [[10, 10], [W-10, 10], [10, H-10], [W-10, H-10]]) {
    const dx = cx === 10 ? 1 : -1, dy = cy === 10 ? 1 : -1;
    line({ x: cx, y: cy }, { x: cx + dx*cs, y: cy });
    line({ x: cx, y: cy }, { x: cx, y: cy + dy*cs });
  }

  // 15. Top telemetry bar
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, 24);
  ctx.fillStyle = '#F5F5F5';
  ctx.font = '11px ui-monospace, monospace';
  ctx.textBaseline = 'middle';
  ctx.fillText(`CAE/CFM-12  ${scanId}`, 8, 12);
  const dt = new Date(ts).toISOString().replace('T', ' ').slice(0, 16) + 'Z';
  const right = `468PT · GPU · float16 · ${dt}`;
  ctx.fillText(right, W - 8 - ctx.measureText(right).width, 12);

  // 16. Bottom telemetry strip
  ctx.fillStyle = 'rgba(0,0,0,0.78)';
  ctx.fillRect(0, H - 42, W, 42);
  ctx.fillStyle = '#F5F5F5';
  ctx.font = '10px ui-monospace, monospace';
  ctx.textBaseline = 'top';
  const r1 = M.metrics.slice(0, 6).map((m) => `${m.id.toUpperCase()}=${m.value.toFixed(2)}`).join('  ');
  const r2 = M.metrics.slice(6).map((m) => `${m.id.toUpperCase()}=${m.value.toFixed(2)}`).join('  ');
  ctx.fillText(r1, 8, H - 36);
  ctx.fillText(r2, 8, H - 20);

  ctx.font = 'bold 14px "Space Grotesk", "Helvetica Neue", sans-serif';
  ctx.fillStyle = verdict.side === 'mog' ? '#2ECF6B' : verdict.side === 'chop' ? '#FF2A2A' : '#FFEC2A';
  const vText = `${verdict.stamp} · Σ=${M.overall.toFixed(1)}`;
  ctx.fillText(vText, W - 8 - ctx.measureText(vText).width, H - 30);
  ctx.textBaseline = 'alphabetic';

  // 17. Diagonal watermark
  ctx.save();
  ctx.translate(W * 0.5, H * 0.5);
  ctx.rotate(-Math.PI / 9);
  ctx.font = 'bold 40px "Space Grotesk", sans-serif';
  ctx.fillStyle = 'rgba(255,42,42,0.07)';
  ctx.textAlign = 'center';
  ctx.fillText('CAE / CFM-12 / DO NOT REPRODUCE', 0, 0);
  ctx.restore();
  ctx.textAlign = 'start';

  return c.toDataURL('image/jpeg', 0.88);
}

// ---- Live section parser (mirrors api/analyze.js parseSections) ----------
function parseLiveSections(raw) {
  const out = { observations: '', profile_inference: '', strengths: [], weaknesses: [], final_remark: '' };
  const lines = raw.split('\n');
  let current = null;
  const buf = { observations: [], profile_inference: [], strengths: [], weaknesses: [], final_remark: [] };
  for (const line of lines) {
    const t = line.trim();
    if (/^\[\+\]\s+OBSERVATIONS\b/i.test(t)) { current = 'observations'; continue; }
    if (/^\[\+\]\s+PROFILE(\s+INFERENCE)?\b/i.test(t)) { current = 'profile_inference'; continue; }
    if (/^\[\+\]\s+STRENGTHS\b/i.test(t)) { current = 'strengths'; continue; }
    if (/^\[\+\]\s+WEAKNESSES\b/i.test(t)) { current = 'weaknesses'; continue; }
    if (/^\[\+\]\s+(FINAL\s+REMARK|REMARK)\b/i.test(t)) { current = 'final_remark'; continue; }
    if (!current) continue;
    if (current === 'strengths' || current === 'weaknesses') {
      const m = /^[-•]\s+(.*)$/.exec(t);
      if (m) buf[current].push(m[1].trim());
    } else {
      buf[current].push(line);
    }
  }
  out.observations = buf.observations.join('\n').trim();
  out.profile_inference = buf.profile_inference.join('\n').trim();
  out.strengths = buf.strengths;
  out.weaknesses = buf.weaknesses;
  out.final_remark = buf.final_remark.join('\n').trim();
  return out;
}

const Camera = ({ onCapture, onCancel, onUpload }) => {
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const [facingMode, setFacingMode] = useState('user');
  const [error, setError] = useState(null);
  const [ready, setReady] = useState(false);
  const [countdown, setCountdown] = useState(0);

  useEffect(() => {
    let cancelled = false;
    const start = async () => {
      setError(null);
      setReady(false);
      if (streamRef.current) streamRef.current.getTracks().forEach((t) => t.stop());
      if (!navigator.mediaDevices?.getUserMedia) {
        setError('CAMERA UNSUPPORTED');
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode, width: { ideal: 1280 }, height: { ideal: 1280 } },
          audio: false,
        });
        if (cancelled) { stream.getTracks().forEach((t) => t.stop()); return; }
        streamRef.current = stream;
        const v = videoRef.current;
        if (v) {
          v.srcObject = stream;
          v.onloadedmetadata = () => v.play().then(() => setReady(true)).catch(() => setReady(true));
        }
      } catch (e) {
        const code = e?.name || '';
        if (code === 'NotAllowedError' || code === 'SecurityError') setError('CAMERA ACCESS DENIED');
        else if (code === 'NotFoundError' || code === 'OverconstrainedError') setError('NO CAMERA FOUND');
        else setError('CAMERA UNAVAILABLE');
      }
    };
    start();
    return () => {
      cancelled = true;
      streamRef.current?.getTracks().forEach((t) => t.stop());
    };
  }, [facingMode]);

  const doSnap = useCallback(() => {
    const v = videoRef.current;
    if (!v || !v.videoWidth) return;
    const c = document.createElement('canvas');
    c.width = v.videoWidth; c.height = v.videoHeight;
    const ctx = c.getContext('2d');
    if (facingMode === 'user') {
      ctx.translate(c.width, 0); ctx.scale(-1, 1);
    }
    ctx.drawImage(v, 0, 0);
    c.toBlob((blob) => {
      if (!blob) return;
      streamRef.current?.getTracks().forEach((t) => t.stop());
      const file = new File([blob], `mogchop-${Date.now()}.jpg`, { type: 'image/jpeg' });
      onCapture(file);
    }, 'image/jpeg', 0.92);
  }, [facingMode, onCapture]);

  const startCountdown = () => {
    if (!ready || countdown > 0) return;
    setCountdown(3);
  };

  useEffect(() => {
    if (countdown <= 0) return;
    const t = setTimeout(() => {
      if (countdown === 1) { doSnap(); setCountdown(0); }
      else setCountdown(countdown - 1);
    }, 700);
    return () => clearTimeout(t);
  }, [countdown, doSnap]);

  const flip = () => setFacingMode((f) => f === 'user' ? 'environment' : 'user');

  return (
    <div className="grid-bg min-h-[100dvh]">
      <Header />
      <main className="px-4 py-4 max-w-md mx-auto">
        <div className="panel p-3 mb-3 relative">
          <span className="corner tl"></span><span className="corner tr"></span>
          <span className="corner bl"></span><span className="corner br"></span>
          <div className="flex items-center justify-between mb-2">
            <span className="label text-[var(--red)]">// LIVE FEED</span>
            <span className="label num">{facingMode === 'user' ? 'FRONT/USER' : 'REAR/ENV'}</span>
          </div>
          <div className="relative bg-[var(--bg-2)]" style={{ aspectRatio: '3 / 4', overflow: 'hidden' }}>
            {error ? (
              <div className="absolute inset-0 flex items-center justify-center text-[var(--red)] text-center px-4">
                <div>
                  <div className="font-display text-3xl mb-2">{error}</div>
                  <div className="label">enable camera permissions or use upload</div>
                </div>
              </div>
            ) : (
              <>
                <video
                  ref={videoRef}
                  className={`specimen-feed ${facingMode !== 'user' ? 'no-mirror' : ''}`}
                  autoPlay playsInline muted
                />
                <div className="face-frame"></div>
                <div className="crosshair-h" style={{ top: '33.3%' }}></div>
                <div className="crosshair-h" style={{ top: '66.6%' }}></div>
                <div className="crosshair-v" style={{ left: '50%' }}></div>
                {countdown > 0 && (
                  <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                    <div className="font-display stamp text-[var(--red)]" style={{ fontSize: '38vw', textShadow: '0 0 32px rgba(255,42,42,0.55)' }}>
                      {countdown}
                    </div>
                  </div>
                )}
              </>
            )}
          </div>
          <div className="flex items-center justify-between mt-2">
            <span className="label">{error ? 'OFFLINE' : ready ? 'READY' : 'INITIALIZING…'}</span>
            <span className="label">center face within ellipse</span>

        </div>

        <div className="flex items-center justify-between mb-3 px-2">
          <button className="btn btn-ghost !w-auto !px-4" onClick={flip} disabled={!!error || !ready}>
            <span>FLIP ↻</span>

          <button
            onClick={startCountdown}
            disabled={!ready || !!error || countdown > 0}

          <button className="btn btn-ghost !w-auto !px-4" onClick={onUpload}>

    const ctx = c.getContext('2d');
    c.width = image.width; c.height = image.height;
    ctx.drawImage(image.el, 0, 0);
    // Draw landmarks
    ctx.fillStyle = 'rgba(255,42,42,0.85)';
    metrics.landmarks.forEach((p, i) => {
      const x = p.x * c.width, y = p.y * c.height;
      ctx.fillRect(x - 0.7, y - 0.7, 1.4, 1.4);
    });
    // Midline + face box
    ctx.strokeStyle = 'rgba(245,245,245,0.55)';
    ctx.lineWidth = 1;
    const fh = metrics.midline.forehead, ch = metrics.midline.chin;
    ctx.beginPath(); ctx.moveTo(fh.x, fh.y); ctx.lineTo(ch.x, ch.y); ctx.stroke();

// ---- Main App ------------------------------------------------------------
const App = () => {
  const [stage, setStage] = useState('intake'); // intake | camera | confirm | scan | result | history
  const [image, setImage] = useState(null); // { el, url, width, height, file }
  const [scanId, setScanId] = useState(null);
  const [progress, setProgress] = useState(0);
  const [statusLines, setStatusLines] = useState([]);
  const [metricsState, setMetricsState] = useState(null);
  const [scan, setScan] = useState(null);
  const [history, setHistory] = useState([]);
  const [err, setErr] = useState(null);

  // Register service worker
  useEffect(() => {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  }, []);

  // Logo click → return home and reset transient scan state
  useEffect(() => {
    const goHome = () => {
      setImage(null);
      setScan(null);
      setMetricsState(null);
      setProgress(0);
      setStatusLines([]);
      setScanId(null);
      setErr(null);
      setStage('intake');
    };
    window.addEventListener('cae:home', goHome);
    return () => window.removeEventListener('cae:home', goHome);
  }, []);

  // Load history
  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) setHistory(JSON.parse(raw));
    } catch {}
  }, []);

  const saveHistory = (next) => {
    setHistory(next);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); } catch {}
  };

  const pushStatus = (line) => setStatusLines((s) => [...s, line]);

  const handlePick = async (file) => {
    setErr(null);
    try {
      const { img, url } = await loadImage(file);
      setImage({ el: img, url, width: img.naturalWidth, height: img.naturalHeight, file });
      setScanId(codeId());
      setStage('confirm');
    } catch (e) {
      setErr('IMAGE LOAD FAILURE');
    }
  };

  const handleAnalyze = async () => {
    if (!image) return;
    setStage('scan');
    setProgress(0);
    setStatusLines([]);
    setMetricsState(null);

    try {
      pushStatus('init: media-pipe.tasks-vision/face_landmarker');
      setProgress(8);
      const landmarker = await getLandmarker();
      pushStatus('model loaded: face_landmarker float16 GPU');
      setProgress(22);

      // Downsize for analysis
      const canvas = downsize(image.el, 1024);
      pushStatus(`specimen prepared @ ${canvas.width}×${canvas.height}px`);
      setProgress(30);

      const result = landmarker.detect(canvas);
      if (!result.faceLandmarks || result.faceLandmarks.length === 0) {
        throw new Error('NO_FACE');
      }
      const landmarks = result.faceLandmarks[0];
      pushStatus(`mesh extracted: ${landmarks.length}pt`);
      setProgress(48);

      const M = computeMetrics(landmarks, canvas.width, canvas.height);
      M.landmarks = landmarks;
      setMetricsState(M);

      // Stream metric reports
      for (let i = 0; i < M.metrics.length; i++) {
        const m = M.metrics[i];
        const valStr = m.unit === '°' ? `${fmt(m.value, 2)}°` : fmt(m.value, 3);
        pushStatus(`m.${String(i+1).padStart(2,'0')} ${m.id}: ${valStr} (z=${fmt(m.z,2)}, s=${fmt(m.score,0)})`);
        setProgress(48 + (i+1) * (32 / M.metrics.length));
        await new Promise((r) => setTimeout(r, 90));
      }

      pushStatus('forwarding to vision-grade qualitative layer…');
      setProgress(82);

      // Send to API (streaming SSE)
      const photoB64 = canvasToB64(downsize(image.el, 768), 'image/jpeg', 0.82);
      const summary = M.metrics.map((m) => ({
        id: m.id, label: m.label, value: Number(m.value.toFixed(4)),
        unit: m.unit, mu: m.mu, sigma: m.sigma, z: Number(m.z.toFixed(3)),
        score: Number(m.score.toFixed(1))
      }));

      const v = verdictFor(M.overall);
      const sigmaDrift = Math.sqrt(M.metrics.reduce((s, m) => s + m.z*m.z, 0) / M.metrics.length);
      const percentile = clamp(100 - (M.overall < 50 ? 90 : 100) * (1 - Math.pow(M.overall/100, 1.4)) + (Math.random()-0.5)*4, 1, 99);
      const ts = Date.now();
      const annotated = renderAnnotatedDossier({ imgEl: image.el, lm: landmarks, M, scanId, verdict: v, ts });
      const thumbCanvas = downsize(image.el, 480);
      const thumb = canvasToB64(thumbCanvas, 'image/jpeg', 0.7);
      pushStatus('dossier rasterized: 17 overlay layers');

      const baseRecord = {
        id: scanId,
        ts,
        overall: M.overall,
        sigmaDrift,
        percentile,
        verdict: v,
        metrics: M.metrics.map(({ id, label, value, unit, mu, sigma, z, score, isScore }) => ({ id, label, value, unit, mu, sigma, z, score, isScore })),
        thumbnail: thumb,
        annotated,
        commentary: { observations: '', profile_inference: '', strengths: [], weaknesses: [], final_remark: '' },
        streaming: true,
      };
      setScan(baseRecord);
      setProgress(95);
      setStage('result');

      let commentary = null;
      let meta = null;
      try {
        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            image_b64: photoB64,
            metrics: summary,
            overall: Number(M.overall.toFixed(2)),
            verdict: v,
          }),
        });
        if (!res.ok || !res.body) {
          pushStatus(`qualitative layer: degraded (${res.status})`);
        } else {
          const reader = res.body.getReader();
          const dec = new TextDecoder();
          let buf = '';
          let acc = '';
          outer: while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buf += dec.decode(value, { stream: true });
            let idx;
            while ((idx = buf.indexOf('\n\n')) >= 0) {
              const evt = buf.slice(0, idx);
              buf = buf.slice(idx + 2);
              const eMatch = evt.match(/^event: (.+)$/m);
              const dMatch = evt.match(/^data: (.+)$/m);
              if (!eMatch || !dMatch) continue;
              let payload;
              try { payload = JSON.parse(dMatch[1]); } catch { continue; }
              const eventType = eMatch[1];
              if (eventType === 'delta') {
                acc += payload.t;
                const live = parseLiveSections(acc);
                setScan((s) => s ? { ...s, commentary: live } : s);
              } else if (eventType === 'complete') {
                commentary = payload.result;
                meta = payload.meta;
              } else if (eventType === 'error') {
                pushStatus(`qualitative layer: ${payload.message}`);
                break outer;
              }
            }
          }
          if (commentary) pushStatus('qualitative layer: complete');
        }
      } catch (e) {
        pushStatus('qualitative layer: offline');
      }
      setProgress(100);

      const finalRecord = { ...baseRecord, commentary: commentary || baseRecord.commentary, streaming: false, meta };
      // Drop the annotated dossier from persisted history — large + regenerable.
      const { annotated: _drop, ...historyRecord } = finalRecord;
      saveHistory([historyRecord, ...history].slice(0, 50));
      setScan(finalRecord);
    } catch (e) {
      console.error(e);
      pushStatus(`fault: ${e.message || 'UNKNOWN'}`);
      setErr(e.message === 'NO_FACE' ? 'NO FACE DETECTED — reframe and retry' : 'ANALYSIS FAULT');
      setTimeout(() => setStage('confirm'), 1200);
    }
  };

  const handleShare = async () => {
    if (!scan) return;
    try {
      if (navigator.share && image) {
        // Share as text+image: encode dossier as PNG via canvas
        const blob = await (await fetch(scan.thumbnail)).blob();
        const file = new File([blob], `mogchop-${scan.id}.jpg`, { type: 'image/jpeg' });
        await navigator.share({
          title: `MOG/CHOP ${scan.id}`,
          text: `${scan.verdict.stamp} · ${scan.verdict.tier} · ${scan.overall.toFixed(1)}`,
          files: [file],
        });
      } else {
        // Fallback: download dossier as JSON
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(scan, null, 2)], { type: 'application/json' }));
        a.download = `mogchop-${scan.id}.json`;
        a.click();
      }
    } catch (e) {
      console.error(e);
    }
  };

  if (err && stage === 'intake') {
    return <div className="p-6 text-[var(--red)]">{err}</div>;
  }

  if (stage === 'intake') {
    return <Intake onCamera={() => setStage('camera')} onPick={handlePick} history={history} onOpenHistory={() => setStage('history')} />;
  }
  if (stage === 'camera') {
    return <Camera onCapture={handlePick} onCancel={() => setStage('intake')} onUpload={() => {
      const inp = document.createElement('input');
      inp.type = 'file'; inp.accept = 'image/*';
      inp.onchange = (e) => e.target.files[0] && handlePick(e.target.files[0]);
      inp.click();
    }} />;
  }
  if (stage === 'confirm') {
    return <Confirm image={image} scanId={scanId} onRetake={() => setStage('camera')} onProceed={handleAnalyze} />;
  }
  if (stage === 'scan') {
    return <Scanning image={image} metrics={metricsState} progress={progress} statusLines={statusLines} scanId={scanId} />;
  }
  if (stage === 'result' && scan) {
    return <Result scan={scan} onNew={() => { setImage(null); setScan(null); setMetricsState(null); setStage('intake'); }} onShare={handleShare} />;
  }
  if (stage === 'history') {
    return <History scans={history} onOpen={(s) => { setScan(s); setStage('result'); }} onBack={() => setStage('intake')} onClear={() => { saveHistory([]); }} />;
  }
  return null;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
